<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <style>
        body {
            background: #f4faff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 5rem auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 102, 161, 0.10);
            padding: 2.5rem 2rem 2rem 2rem;
            text-align: center;
        }
        h1 {
            color: #0066a1;
            margin-bottom: 1.2rem;
        }
        p {
            color: #333;
            margin-bottom: 1.5rem;
        }
        a {
            color: #00a1e4;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Something went wrong</h1>
        <p th:text="${message}">An unexpected error occurred. Please try again later.</p>
        <a href="/home">Go to Home</a>
    </div>
</body>
</html>
