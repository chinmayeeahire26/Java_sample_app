<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <style>
        body {
            background: #f4faff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 3rem auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 102, 161, 0.10);
            padding: 2.5rem 2rem 2rem 2rem;
        }
        h1 {
            color: #0066a1;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .order-id {
            text-align: center;
            font-size: 1.1rem;
            color: #222;
            margin-bottom: 2rem;
        }
        .order-summary {
            background: #e6f4fa;
            border-radius: 10px;
            padding: 1.5rem 1rem;
            margin-bottom: 2rem;
        }
        .order-summary ul {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem 0;
        }
        .order-summary li {
            margin-bottom: 0.7rem;
            font-size: 1rem;
            color: #0066a1;
        }
        .order-summary .total {
            font-weight: bold;
            color: #00a1e4;
            font-size: 1.1rem;
        }
        .shipping-info {
            background: #f4faff;
            border-radius: 10px;
            padding: 1rem 1rem 1.2rem 1rem;
            margin-bottom: 2rem;
        }
        .thank-you {
            text-align: center;
            font-size: 1.2rem;
            color: #0066a1;
            margin-bottom: 1.5rem;
        }
        .home-link {
            display: block;
            text-align: center;
            color: #00a1e4;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1.5rem;
        }
        .home-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Order Confirmation</h1>
        <div class="thank-you">Thank you for your order!</div>
        <div class="order-id">Your order ID is: <strong th:text="${orderId}"></strong></div>
        <div class="order-summary">
            <h2>Order Details:</h2>
            <ul>
                <li th:each="product : ${order.products}">
                    <span th:text="${product.name}"></span> - $<span th:text="${product.price}"></span>
                </li>
            </ul>
            <div class="total">Total Price: $<span th:text="${order.totalPrice}"></span></div>
        </div>
        <div class="shipping-info">
            <h2>Shipping Information:</h2>
            <p><strong>Address:</strong> <span th:text="${order.shippingInfo.address}"></span></p>
            <p><strong>City:</strong> <span th:text="${order.shippingInfo.city}"></span></p>
            <p><strong>Postal Code:</strong> <span th:text="${order.shippingInfo.postalCode}"></span></p>
        </div>
        <a href="/home" class="home-link">Return to Home</a>
    </div>
</body>
</html>
